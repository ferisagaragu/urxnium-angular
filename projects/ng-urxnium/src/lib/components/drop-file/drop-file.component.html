<input
  #inputFile
  hidden
  type="file"
  (change)="onSelectFile($event)"
>

<div *ngIf="files.length !== 0" class="multiple-file-zone scroll">
  <lib-file-card
    *ngFor="let file of files"
    [multiple]="true"
    [name]="file.name"
    (remove)="removeFile(file.name)"
  >
  </lib-file-card>
</div>

<div
  #uploadZone
  class="upload-zone"
  [class.upload-zone-not-pointer]="file"
  [class.upload-zone-error]="isInvalidForm() || error"
  (drop)="onDrop($event, uploadZone)"
  (dragover)="onDragOver($event, uploadZone)"
  (dragleave)="onDragLeave($event, uploadZone)"
>
  <div
    *ngIf="!file"
    (click)="onClick(inputFile)"
  >
    <em class="mdi mdi-upload mdi-48px"></em>
    <br />
    {{ label }}
  </div>

  <lib-file-card
    *ngIf="file"
    [name]="file.name"
    (remove)="removeSimpleFile()"
  >
  </lib-file-card>
</div>

<mat-error *ngIf="isInvalidForm() || error">
  {{ errorMessage }}
</mat-error>
